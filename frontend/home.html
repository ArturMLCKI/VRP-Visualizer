<!DOCTYPE html>
<html>
<head>
    <title>VRP Visualizer</title>

    <link 
        rel="stylesheet" 
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
</head>

<body>

    <h3>Enter Start and Destination Addresses</h3>

    <form method="POST">

        <h4>Start</h4>

        <input 
            type="text" 
            name="start_address" 
            placeholder="Enter address"
        >

        <br><br>

        <input 
            type="text" 
            name="start_x" 
            placeholder="Enter X coordinate (latitude)"
        >

        <br><br>

        <input 
            type="text" 
            name="start_y" 
            placeholder="Enter Y coordinate (longitude)"
        >

        <br><br>

        <h4>Destination</h4>

        <input 
            type="text" 
            name="destination_address" 
            placeholder="Enter address"
        >

        <br><br>

        <input 
            type="text" 
            name="destination_x" 
            placeholder="Enter X coordinate (latitude)"
        >

        <br><br>

        <input 
            type="text" 
            name="destination_y" 
            placeholder="Enter Y coordinate (longitude)"
        >

        <br><br>

        <input 
            type="submit" 
            value="Submit"
        >

    </form>


    <br>


    <div id="myMap" style="width: 100%; height: 450px;"></div>


    <script 
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="">
    </script>


    <script>

        function showMap(id, startLat, startLon, startLabel, destLat, destLon, destLabel) {

            const roadsLayer = L.tileLayer(
                'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
                {
                    maxZoom: 19,
                    attribution:
                    '&copy; OpenStreetMap contributors &copy; CARTO'
                }
            );

            const satLayer = L.tileLayer(
                'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                {
                    maxZoom: 19,
                    attribution:
                    '&copy; ESRI'
                }
            );


            const map = L.map(id, {
                layers: [roadsLayer],
                center: [startLat, startLon],
                zoom: 14,
                scrollWheelZoom: false
            });


            const start_marker = L.marker([startLat, startLon])
                .addTo(map)
                .bindPopup(startLabel);

            const destination_marker = L.marker([destLat, destLon])
                .addTo(map)
                .bindPopup(destLabel);


            L.control.layers(
                {
                    "Roads": roadsLayer,
                    "Satellite": satLayer
                },
                {
                    "Start": start_marker,
                    "Destination": destination_marker
                }
            ).addTo(map);

        }



        document.addEventListener("DOMContentLoaded", () => {

            showMap(
                "myMap",
                {{ start_x }},
                {{ start_y }},
                {{ start_address | tojson }},
                {{ destination_x }},
                {{ destination_y }},
                {{ destination_address | tojson }}
            );

        });


    </script>


</body>
</html>
